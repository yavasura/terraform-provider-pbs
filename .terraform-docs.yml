# Terraform Registry Manifest
# This file describes the provider for the Terraform Registry

version: 1
formatter: markdown

sections:
  show:
    - providers
    - resources
    - data-sources

content: |-
  {{ if .Providers -}}
  ## Providers
  
  {{ range .Providers -}}
  - [{{ .Name }}]({{ .URL }})
  {{ end -}}
  {{ end -}}

  {{ if .Resources -}}
  ## Resources
  
  {{ range .Resources -}}
  - [{{ .Name }}]({{ .URL }})
  {{ end -}}
  {{ end -}}

  {{ if .DataSources -}}
  ## Data Sources
  
  {{ range .DataSources -}}
  - [{{ .Name }}]({{ .URL }})
  {{ end -}}
  {{ end -}}

output:
  file: README.md
  mode: replace

providers:
  - name: pbs
    path: internal/provider/provider.go

resources:
  - name: pbs_datastore
    path: internal/provider/resources/datastores/datastore.go
  - name: pbs_s3_endpoint
    path: internal/provider/resources/endpoints/s3_endpoint.go

sort:
  enabled: true
  by: name

settings:
  anchor: true
  color: true
  escape: true
  html: true
